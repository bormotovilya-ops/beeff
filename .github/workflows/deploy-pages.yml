name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build

      - name: Resolve static output directory
        id: static
        run: |
          for dir in dist/client .output/public dist; do
            if [ -f "$dir/index.html" ]; then
              echo "dir=$dir" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No static index.html found. Build output:"
          find . -name index.html -not -path './node_modules/*' 2>/dev/null | head -20
          exit 1

      - name: Add SPA fallback for GitHub Pages
        run: cp "${{ steps.static.outputs.dir }}/index.html" "${{ steps.static.outputs.dir }}/404.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.static.outputs.dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
